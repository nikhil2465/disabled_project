version: '3.8'

services:
  # Database Services
  postgres:
    image: postgres:14-alpine
    container_name: accessibility-postgres
    environment:
      POSTGRES_DB: accessibility_platform
      POSTGRES_USER: accessibility_user
      POSTGRES_PASSWORD: accessibility_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - accessibility-network

  redis:
    image: redis:7-alpine
    container_name: accessibility-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - accessibility-network

  # Object Storage
  minio:
    image: minio/minio:latest
    container_name: accessibility-minio
    environment:
      MINIO_ROOT_USER: accessibility_user
      MINIO_ROOT_PASSWORD: accessibility_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - accessibility-network

  # Backend Microservices
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: accessibility-api-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: accessibility_platform
      POSTGRES_USER: accessibility_user
      POSTGRES_PASSWORD: accessibility_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: accessibility_user
      MINIO_SECRET_KEY: accessibility_password
      JWT_SECRET: your-super-secret-jwt-key-here
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - accessibility-network

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: accessibility-user-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: accessibility_platform
      POSTGRES_USER: accessibility_user
      POSTGRES_PASSWORD: accessibility_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-here
    depends_on:
      - postgres
      - redis
    networks:
      - accessibility-network

  content-service:
    build:
      context: ./backend/content-service
      dockerfile: Dockerfile
    container_name: accessibility-content-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: accessibility_platform
      POSTGRES_USER: accessibility_user
      POSTGRES_PASSWORD: accessibility_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: accessibility_user
      MINIO_SECRET_KEY: accessibility_password
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - accessibility-network

  media-service:
    build:
      context: ./backend/media-service
      dockerfile: Dockerfile
    container_name: accessibility-media-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: accessibility_platform
      POSTGRES_USER: accessibility_user
      POSTGRES_PASSWORD: accessibility_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: accessibility_user
      MINIO_SECRET_KEY: accessibility_password
      OPENAI_API_KEY: your-openai-api-key-here
      GOOGLE_VISION_API_KEY: your-google-vision-api-key-here
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - accessibility-network

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: accessibility-notification-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: accessibility_platform
      POSTGRES_USER: accessibility_user
      POSTGRES_PASSWORD: accessibility_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      TWILIO_ACCOUNT_SID: your-twilio-sid
      TWILIO_AUTH_TOKEN: your-twilio-token
    depends_on:
      - postgres
      - redis
    networks:
      - accessibility-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accessibility-frontend
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: http://localhost:3000/api
      REACT_APP_MINIO_URL: http://localhost:9000
    depends_on:
      - api-gateway
    networks:
      - accessibility-network

  # Search Engine
  elasticsearch:
    image: elasticsearch:8.8.0
    container_name: accessibility-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - accessibility-network

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: accessibility-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - accessibility-network

  grafana:
    image: grafana/grafana:latest
    container_name: accessibility-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - accessibility-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  accessibility-network:
    driver: bridge
